# GitHub Actions 自动化测试工作流
# 触发条件：push 或 PR 到 main 分支

name: 自动化测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 运行接口测试
    runs-on: ubuntu-latest

    # 服务容器 — 启动 MySQL 和 Redis（GitHub Actions 原生支持）
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: taskflow
          MYSQL_USER: taskflow
          MYSQL_PASSWORD: taskflow123
        ports:
          - 3306:3306
        # 等待 MySQL 就绪
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Step 1: 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # Step 2: 配置 Python 环境
      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 缓存 pip 依赖，加速后续构建

      # Step 3: 安装测试依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: 安装并启动 SUT
      - name: 安装 SUT 依赖
        run: pip install -r sut/requirements.txt

      - name: 启动 SUT（后台运行）
        env:
          DATABASE_URL: mysql+pymysql://taskflow:taskflow123@localhost:3306/taskflow
          REDIS_URL: redis://localhost:6379/0
          REDIS_PASSWORD: redis123
          JWT_SECRET: ci-test-secret-key
        run: |
          cd sut
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5  # 等待服务启动

      # Step 5: 运行测试
      - name: 运行 pytest
        run: python -m pytest tests/ -v --tb=short --junitxml=reports/junit.xml

      # Step 6: 上传测试报告（失败时也上传）
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            !reports/allure-results/
          retention-days: 30
