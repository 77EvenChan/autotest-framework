# 登录接口测试数据 — 数据驱动
cases:
  - case_id: "LOGIN_001"
    title: "正常登录"
    username: "testadmin"
    password: "Test@123456"
    expected_code: 200
    expected_has_token: true

  - case_id: "LOGIN_002"
    title: "密码错误"
    username: "testadmin"
    password: "wrong_password"
    expected_code: 400
    expected_has_token: false

  - case_id: "LOGIN_003"
    title: "用户不存在"
    username: "ghost_user_xyz"
    password: "Test@123"
    expected_code: 400
    expected_has_token: false

  - case_id: "LOGIN_004"
    title: "用户名为空"
    username: ""
    password: "Test@123456"
    expected_code: 400
    expected_has_token: false

  - case_id: "LOGIN_005"
    title: "密码为空"
    username: "testadmin"
    password: ""
    expected_code: 400
    expected_has_token: false
